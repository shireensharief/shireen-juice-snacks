<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="url(#bgGrad)" stroke="#fff" stroke-width="3"/>

  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b35"/>
      <stop offset="50%" style="stop-color:#ff9a56"/>
      <stop offset="100%" style="stop-color:#ffcc02"/>
    </linearGradient>
    <linearGradient id="glassGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fff;stop-opacity:0.95"/>
      <stop offset="100%" style="stop-color:#f0e6ff;stop-opacity:0.9"/>
    </linearGradient>
    <linearGradient id="juiceGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff9a56"/>
      <stop offset="100%" style="stop-color:#ff6b35"/>
    </linearGradient>
    <linearGradient id="leafGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4ecdc4"/>
      <stop offset="100%" style="stop-color:#2ecc71"/>
    </linearGradient>
  </defs>

  <!-- Juice glass body -->
  <path d="M72 68 L65 145 C64 155 72 162 85 162 L115 162 C128 162 136 155 135 145 L128 68 Z"
        fill="url(#glassGrad)" stroke="#e0d5c7" stroke-width="1.5"/>

  <!-- Juice liquid -->
  <path d="M70 95 L65 145 C64 155 72 162 85 162 L115 162 C128 162 136 155 135 145 L130 95 Z"
        fill="url(#juiceGrad)" opacity="0.85"/>

  <!-- Juice bubbles -->
  <circle cx="88" cy="130" r="4" fill="#fff" opacity="0.4"/>
  <circle cx="108" cy="120" r="3" fill="#fff" opacity="0.35"/>
  <circle cx="95" cy="110" r="2.5" fill="#fff" opacity="0.3"/>

  <!-- Glass rim highlight -->
  <path d="M72 68 L128 68" stroke="#fff" stroke-width="2" opacity="0.6"/>

  <!-- Straw -->
  <rect x="108" y="32" width="6" height="90" rx="3" fill="#ff4757" transform="rotate(12, 111, 77)"/>
  <rect x="108" y="32" width="6" height="90" rx="3" fill="url(#strawStripe)" transform="rotate(12, 111, 77)" opacity="0.3"/>

  <!-- Straw stripe pattern -->
  <defs>
    <pattern id="strawStripe" x="0" y="0" width="6" height="12" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <rect x="0" y="0" width="3" height="12" fill="#fff"/>
    </pattern>
  </defs>

  <!-- Orange slice on rim -->
  <g transform="translate(60, 58) rotate(-15)">
    <path d="M0 0 A18 18 0 0 1 36 0 Z" fill="#ffa502"/>
    <path d="M0 0 A18 18 0 0 1 36 0 Z" fill="none" stroke="#ff9a00" stroke-width="1"/>
    <path d="M18 0 L6 -16" stroke="#ffcc02" stroke-width="1.5" opacity="0.6"/>
    <path d="M18 0 L14 -17" stroke="#ffcc02" stroke-width="1.5" opacity="0.6"/>
    <path d="M18 0 L22 -17" stroke="#ffcc02" stroke-width="1.5" opacity="0.6"/>
    <path d="M18 0 L28 -14" stroke="#ffcc02" stroke-width="1.5" opacity="0.6"/>
    <path d="M18 0 L10 -14" stroke="#ffcc02" stroke-width="1.5" opacity="0.6"/>
    <circle cx="18" cy="-1" r="3" fill="#ff6b35" opacity="0.5"/>
  </g>

  <!-- Leaf/mint garnish -->
  <g transform="translate(125, 48) rotate(20)">
    <path d="M0 0 Q8 -18 0 -28 Q-8 -18 0 0 Z" fill="url(#leafGrad)"/>
    <path d="M0 0 L0 -26" stroke="#2ecc71" stroke-width="0.8" opacity="0.5"/>
    <path d="M8 -4 Q14 -22 8 -30 Q2 -22 8 -4 Z" fill="url(#leafGrad)" opacity="0.8"/>
  </g>

</svg>
